name: Docs

on:
  pull_request:
    paths: ['modules/**']

jobs:
  terraform-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install terraform-docs v0.20.0
        run: |
          curl -sSLo /tmp/terraform-docs.tar.gz \
            https://github.com/terraform-docs/terraform-docs/releases/download/v0.20.0/terraform-docs-v0.20.0-linux-amd64.tar.gz
          tar -xzf /tmp/terraform-docs.tar.gz -C /usr/local/bin terraform-docs
          chmod +x /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: Generate docs
        run: ./scripts/generate-docs.sh

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::terraform-docs output is stale. Run ./scripts/generate-docs.sh and commit the changes."
            git diff --stat
            exit 1
          fi
